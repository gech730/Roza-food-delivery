<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0392B"/>
      <stop offset="100%" style="stop-color:#922B21"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5CBA7"/>
      <stop offset="100%" style="stop-color:#E59866"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>

  <!-- Decorative ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Plate / injera base -->
  <ellipse cx="100" cy="115" rx="62" ry="14" fill="rgba(0,0,0,0.18)"/>
  <ellipse cx="100" cy="110" rx="62" ry="38" fill="url(#plate)"/>

  <!-- Injera texture lines -->
  <ellipse cx="100" cy="110" rx="50" ry="30" fill="none" stroke="#D4A574" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="100" cy="110" rx="36" ry="22" fill="none" stroke="#D4A574" stroke-width="1.2" opacity="0.5"/>
  <ellipse cx="100" cy="110" rx="22" ry="13" fill="none" stroke="#D4A574" stroke-width="1" opacity="0.4"/>

  <!-- Stew/wat on top -->
  <ellipse cx="100" cy="104" rx="28" ry="16" fill="#922B21"/>
  <ellipse cx="100" cy="104" rx="22" ry="12" fill="#C0392B"/>
  <ellipse cx="100" cy="104" rx="14" ry="8" fill="#E74C3C"/>

  <!-- Steam lines -->
  <path d="M85 72 Q83 65 85 58 Q87 51 85 44" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M100 68 Q98 61 100 54 Q102 47 100 40" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M115 72 Q113 65 115 58 Q117 51 115 44" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Letter R -->
  <text x="100" y="175" font-family="Georgia, serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" letter-spacing="4">ROZA</text>
</svg>
